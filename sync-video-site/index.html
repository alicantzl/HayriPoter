<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Senkronizasyon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Sora:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="launchScreen" class="launch-screen">
        <div class="launch-card">
            <p class="launch-kicker">Sync Video</p>
            <h2>Yukleniyor</h2>
            <div class="launch-bar"><span></span></div>
        </div>
    </div>
    <div class="bg-orb orb-one"></div>
    <div class="bg-orb orb-two"></div>
    <div class="container">
        <header>
            <h1>Video Senkronizasyon Platformu</h1>
            <p class="tagline">Ayni anda izle, tek host ile herkesi senkron tut.</p>
        </header>
        
        <main>
            <div class="tabs">
                <button class="tab-btn active" id="hostTab">Host Ol</button>
                <button class="tab-btn" id="joinTab">Katıl</button>
            </div>
            
            <div class="tab-content">
                <!-- Host Section -->
                <div id="hostSection" class="tab-pane active">
                    <h2>Oda Oluştur</h2>
                    <div class="form-group">
                        <label for="videoLink">Video Linki:</label>
                        <input type="text" id="videoLink" placeholder="Video URL'si">
                    </div>
                    <div class="form-group">
                        <label for="audioLink">Ses Linki (Opsiyonel):</label>
                        <input type="text" id="audioLink" placeholder="Ses URL'si">
                    </div>
                    <div class="form-group">
                        <label for="subtitleLink">Alt Yazı Linki (Opsiyonel):</label>
                        <input type="text" id="subtitleLink" placeholder="Alt Yazı URL'si">
                    </div>
                    <button id="createRoomBtn" class="primary-btn">Oda Oluştur ve Yayını Başlat</button>
                </div>
                
                <!-- Join Section -->
                <div id="joinSection" class="tab-pane">
                    <h2>Odaya Katıl</h2>
                    <div class="form-group">
                        <label for="roomId">Oda ID:</label>
                        <input type="text" id="roomId" placeholder="Oda ID'sini girin">
                    </div>
                    <button id="joinRoomBtn" class="primary-btn">Odaya Katıl</button>
                </div>
            </div>
            
            <!-- Video Player Section (hidden initially) -->
            <div id="videoSection" class="hidden">
                <div class="player-controls">
                    <button id="prev15s">⏪ 15s</button>
                    <button id="playPauseBtn">▶️ Oynat</button>
                    <button id="next15s">⏩ 15s</button>
                    <button id="fullscreenBtn">⛶ Tam Ekran</button>
                    <label class="volume-control" for="volumeRange">Ses
                        <input type="range" id="volumeRange" min="0" max="1" step="0.05" value="1">
                    </label>
                    <span id="participantCount">Katılımcı: 0</span>
                </div>

                <div id="hostSettingsPanel" class="host-settings hidden">
                    <h3>Yayin Ayarlari (Host)</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="hostVideoLink">Video Linki</label>
                            <input type="text" id="hostVideoLink" placeholder="Video URL">
                        </div>
                        <div class="form-group">
                            <label for="hostAudioLink">Ses Linki (Opsiyonel)</label>
                            <input type="text" id="hostAudioLink" placeholder="Ses URL">
                        </div>
                        <div class="form-group">
                            <label for="hostSubtitleLink">Alt Yazi Linki (Opsiyonel)</label>
                            <input type="text" id="hostSubtitleLink" placeholder="Alt yazi URL">
                        </div>
                    </div>
                    <button id="applyMediaLinksBtn" class="primary-btn">Filmi Degistir ve Senkronla</button>
                </div>
                
                <div class="video-container">
                    <video id="videoPlayer" controls controlslist="nodownload noplaybackrate">
                        <track id="subtitleTrack" kind="subtitles" label="Turkish" srclang="tr">
                    </video>
                </div>
                
                <div id="connectionStatus" class="status-indicator">
                    <span id="statusText">Bağlantı: Bağlantı kuruluyor...</span>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js" crossorigin="anonymous"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
